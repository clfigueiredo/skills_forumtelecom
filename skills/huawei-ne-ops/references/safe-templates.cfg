# =============================================================================
# safe-templates.cfg — Huawei VRP V8 (NE40E/NE8000) snippets validados
# =============================================================================

# 1. BGP — Peer com upstream
system-view
bgp <SEU_ASN>
 router-id <SEU_ROUTER_ID>
 peer <PEER_IP> as-number <PEER_ASN>
 peer <PEER_IP> description "Upstream provider"
 peer <PEER_IP> password cipher <SENHA>
 peer <PEER_IP> ttl-security hops 1
 #
 ipv4-family unicast
  peer <PEER_IP> enable
  peer <PEER_IP> route-policy UPSTREAM-IN import
  peer <PEER_IP> route-policy UPSTREAM-OUT export
  peer <PEER_IP> route-limit 1500000 90
commit

# Filtros bogons
ip ip-prefix BOGONS index 10 permit 10.0.0.0 8 less-equal 32
ip ip-prefix BOGONS index 20 permit 172.16.0.0 12 less-equal 32
ip ip-prefix BOGONS index 30 permit 192.168.0.0 16 less-equal 32
ip ip-prefix BOGONS index 40 permit 169.254.0.0 16 less-equal 32

route-policy UPSTREAM-IN deny node 10
 if-match ip-prefix BOGONS
route-policy UPSTREAM-IN permit node 100
commit

# 2. RTBH BLACKHOLE — community customizável (ajustar para seu ASN)
ip community-filter basic BLACKHOLE-COMM index 10 permit <SEU_ASN>:666

route-policy RTBH-IN permit node 10
 if-match community-filter BLACKHOLE-COMM
 apply ip-address next-hop 192.0.2.1
 apply local-preference 200
commit

# 3. ACL VTY — restringir SSH
acl number 2000
 rule 10 permit source 10.0.0.0 0.0.0.255
 rule 20 deny

user-interface vty 0 4
 acl 2000 inbound
 protocol inbound ssh
 authentication-mode aaa
commit

# 4. AAA com RADIUS (BNG common)
radius-server group RADIUS-GRP
 radius-server authentication 10.0.0.10 1812
 radius-server accounting 10.0.0.10 1813
 radius-server shared-key cipher <KEY>
 radius-server retransmit 3
 radius-server timeout 5

aaa
 authentication-scheme RADIUS-SCHEME
  authentication-mode radius
 accounting-scheme RADIUS-ACCT
  accounting-mode radius
 domain default
  authentication-scheme RADIUS-SCHEME
  accounting-scheme RADIUS-ACCT
  radius-server group RADIUS-GRP
commit

# 5. SNMPv3 para Zabbix
snmp-agent
snmp-agent sys-info version v3
snmp-agent group v3 ZBX-GRP privacy
snmp-agent usm-user v3 zbxmon group ZBX-GRP authentication-mode sha cipher <AUTHPASS> privacy-mode aes128 cipher <PRIVPASS>
commit

# 6. NETSTREAM (Huawei NetFlow) — exportar para coletor
ip netstream sampler to-cpu fix-packets 1000 inbound
ip netstream timeout active 1
ip netstream timeout inactive 30
ip netstream export source <LOOPBACK_IP>
ip netstream export host 10.0.0.50 9995
ip netstream export version 9
ip netstream export template timeout-rate 1

interface GigabitEthernet0/0/1
 ip netstream inbound
 ip netstream outbound
commit

# 7. uRPF strict (interface de cliente)
interface GigabitEthernet0/0/2
 ip urpf strict allow-default-route
commit

# 8. BFD para BGP (failover rápido)
bfd
bfd <SESSION_NAME> bind peer-ip <PEER_IP> source-ip <LOCAL_IP>
 discriminator local 100
 discriminator remote 200
 commit

bgp <ASN>
 peer <PEER_IP> bfd enable
commit

# 9. PPPoE BNG básico (ISP comum)
acl number 3000
 rule 10 permit ip
ip pool POOL-CLIENTES
 gateway-list 10.20.0.1
 network 10.20.0.0 mask 255.255.0.0
 dns-list 8.8.8.8 1.1.1.1
commit

aaa
 domain "isp.com.br"
  authentication-scheme RADIUS-SCHEME
  accounting-scheme RADIUS-ACCT
  radius-server group RADIUS-GRP
  ip-pool POOL-CLIENTES
commit

interface Virtual-Template1
 ppp authentication-mode chap pap
 ppp ipcp dns 8.8.8.8 1.1.1.1
 ip address unnumbered interface LoopBack0

interface GigabitEthernet0/0/3
 pppoe-server bind Virtual-Template 1
commit
